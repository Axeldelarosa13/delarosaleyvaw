<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo Avicola helper</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050914;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #050914;
    }
  </style>
</head>
<body>
  <iframe id="app" src="/avicola/" referrerpolicy="no-referrer"></iframe>
  <script>
    const frame = document.getElementById('app');
    const emailValue = 'admin@salas.com';
    const passwordValue = 'admin123';
    let loggedIn = false;

    function setNativeValue(input, value) {
      const proto = Object.getPrototypeOf(input);
      const descriptor = Object.getOwnPropertyDescriptor(proto, 'value') || Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
      if (descriptor && descriptor.set) {
        descriptor.set.call(input, value);
      } else {
        input.value = value;
      }
      input.dispatchEvent(new Event('input', { bubbles: true }));
      input.dispatchEvent(new Event('change', { bubbles: true }));
    }

    function tryLogin() {
      if (loggedIn) return;
      try {
        const win = frame.contentWindow;
        const doc = win && win.document;
        if (!doc) return;
        const email = doc.querySelector('input[placeholder="usuario@salas.com"]');
        const password = doc.querySelector('input[type="password"]');
        if (!email || !password) return;

        setNativeValue(email, emailValue);
        setNativeValue(password, passwordValue);

        const submitButton = [...doc.querySelectorAll('button')].find((button) => /Desbloquear boveda/i.test(button.textContent || ''));
        const form = submitButton?.closest('form') || doc.querySelector('form');

        loggedIn = true;
        if (form && typeof form.requestSubmit === 'function') {
          form.requestSubmit();
        } else if (submitButton) {
          submitButton.click();
        }
      } catch (error) {
        console.error(error);
      }
    }

    frame.addEventListener('load', () => {
      setTimeout(tryLogin, 600);
    });

    setTimeout(tryLogin, 1200);
    setTimeout(tryLogin, 2600);
  </script>
</body>
</html>
